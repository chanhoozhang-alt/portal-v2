# 后端服务器组定义
# upstream 定义一组后端服务，名字在 proxy_pass 中引用
# keepalive 32 — 维护 32 个长连接池，复用 TCP 连接，避免每次请求重新握手
upstream portal   { server 127.0.0.1:8081; keepalive 32; }  # 门户服务
upstream console  { server 127.0.0.1:8082; keepalive 32; }  # 管理后台服务
upstream server   { server 127.0.0.1:8083; keepalive 32; }  # 认证服务

server {
    listen       80;                        # 监听 HTTP 默认端口
    server_name  portal.example.com;        # 只处理该域名的请求

    # 前端静态文件
    location / {                            # 兜底匹配，其他 location 未命中时走这里
        root   /usr/share/nginx/html;       # 静态文件根目录
        index  index.html;                  # 默认首页
        try_files $uri $uri/ /index.html;   # SPA 标准写法：找不到文件则返回 index.html，交给前端路由处理
    }

    # 门户接口
    location /api/portal/ {                 # 匹配 /api/portal/ 开头的请求
        proxy_pass http://portal;           # 转发到 upstream portal（8081），路径原样传递
        proxy_set_header Host $host;                          # 保留原始域名，不变成 127.0.0.1
        proxy_set_header X-Real-IP $remote_addr;              # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 记录完整代理 IP 链路
        proxy_set_header X-Forwarded-Proto $scheme;           # 告知后端原始协议（http/https）
        proxy_connect_timeout 10s;                           # 与后端建立连接的超时
        proxy_read_timeout 30s;                              # 等待后端响应的超时
    }

    # 管理后台接口
    location /api/admin/ {                  # 匹配 /api/admin/ 开头的请求
        proxy_pass http://console;          # 转发到 upstream console（8082）
        proxy_set_header Host $host;                          # 保留原始域名，不变成 127.0.0.1
        proxy_set_header X-Real-IP $remote_addr;              # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 记录完整代理 IP 链路
        proxy_set_header X-Forwarded-Proto $scheme;           # 告知后端原始协议（http/https）
        proxy_connect_timeout 10s;                            # 与后端建立连接的超时
        proxy_read_timeout 30s;                               # 等待后端响应的超时
    }

    # 开放接口（登录等）
    location /api/open/ {                   # 匹配 /api/open/ 开头的请求
        proxy_pass http://server;           # 转发到 upstream server（8083）
        proxy_set_header Host $host;                          # 保留原始域名，不变成 127.0.0.1
        proxy_set_header X-Real-IP $remote_addr;              # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 记录完整代理 IP 链路
        proxy_set_header X-Forwarded-Proto $scheme;           # 告知后端原始协议（http/https）
        proxy_connect_timeout 10s;                            # 与后端建立连接的超时
        proxy_read_timeout 30s;                               # 等待后端响应的超时
    }

    # 静态资源缓存
    location /assets/ {                     # 前端打包后的 JS/CSS/图片
        root /usr/share/nginx/html;
        expires 30d;                                                # 浏览器缓存 30 天
        add_header Cache-Control "public, immutable";               # public=允许 CDN 缓存，immutable=内容不变无需重新验证
    }

    error_page 500 502 503 504 /50x.html;  # 后端错误时展示自定义错误页
    location = /50x.html {                 # = 精确匹配，只有 /50x.html 本身才命中
        root /usr/share/nginx/html;        # 错误页文件所在静态目录
    }
}
